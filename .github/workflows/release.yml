name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true
        type: string
      upload_assets:
        description: "Upload release binaries to GitHub Release"
        required: false
        default: false
        type: boolean
      publish_cargo:
        description: "Also publish to crates.io"
        required: false
        default: false
        type: boolean
      update_homebrew:
        description: "Also update Homebrew tap formula"
        required: false
        default: false
        type: boolean

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          lfs: true

      - name: Validate release tag
        run: |
          if [[ "${RELEASE_TAG}" != v* ]]; then
            echo "::error::release tag must start with 'v' (got: ${RELEASE_TAG})"
            exit 1
          fi

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --lib --bins --tests

  prepare-release:
    name: Prepare GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          lfs: true

      - name: Check existing release
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Release ${RELEASE_TAG} already exists; skip creation."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != 'true'
        uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.RELEASE_REF }}

  upload-assets:
    name: Upload binaries (${{ matrix.target }})
    needs: prepare-release
    if: github.event_name == 'push' || github.event.inputs.upload_assets == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          lfs: true
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: glyphweave
          target: ${{ matrix.target }}
          checksum: sha256
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.RELEASE_REF }}

  publish-crates:
    name: Publish crate to crates.io
    needs: prepare-release
    if: github.event_name == 'push' || github.event.inputs.publish_cargo == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          lfs: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          output="$(cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}" 2>&1)"
          status=$?
          set -e
          echo "${output}"
          if [[ ${status} -ne 0 ]]; then
            if echo "${output}" | grep -qi "already uploaded"; then
              echo "Crate version already published, treat as success."
              exit 0
            fi
            exit "${status}"
          fi

  update-homebrew-tap:
    name: Update Homebrew tap formula
    needs: prepare-release
    if: github.event_name == 'push' || github.event.inputs.update_homebrew == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: Acture/homebrew-ac
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula with current release
        run: |
          set -euo pipefail
          formula="tap/Formula/glyphweave.rb"
          source_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          curl -fsSL "${source_url}" -o /tmp/glyphweave-src.tar.gz
          source_sha256="$(sha256sum /tmp/glyphweave-src.tar.gz | awk '{print $1}')"
          cat > "${formula}" <<EOF
          class Glyphweave < Formula
            desc "Shape-constrained SVG word clouds, built for speed"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            url "${source_url}"
            sha256 "${source_sha256}"
            license "AGPL-3.0-only"

            livecheck do
              url :stable
              regex(/^v?(\\d+(?:\\.\\d+)+)$/i)
            end

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              font = [
                "/Library/Fonts/NotoSansSC-Regular.ttf",
                "/Library/Fonts/SourceHanSansSC-Regular.otf",
                "/System/Library/Fonts/Supplemental/Arial.ttf",
                "/usr/share/fonts/truetype/noto/NotoSansSC-Regular.ttf",
                "/usr/share/fonts/opentype/noto/NotoSansSC-Regular.otf",
                "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf",
              ].find { |path| File.exist?(path) }
              assert font, "No suitable system font found for glyphweave test"

              (testpath/"words.txt").write("cloud,3\\nsvg,2\\nlayout\\n")
              output = testpath/"out.svg"

              system bin/"glyphweave", "--text", "AI",
                                        "--word-file", testpath/"words.txt",
                                        "--algorithm", "fast-grid",
                                        "--seed", "7",
                                        "--font", font,
                                        "--no-progress",
                                        "--output", output
              assert_predicate output, :exist?
              assert_match "<svg", output.read
            end
          end
          EOF

      - name: Commit and push formula update
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet -- Formula/glyphweave.rb; then
            echo "No formula changes detected; skip commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A Formula/glyphweave.rb
          git commit -m "glyphweave ${RELEASE_TAG}"
          git push
